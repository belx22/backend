# ============================================================================
#  Configuration backend — Plateforme Valeurs du Tresor CEMAC (Afriland First Bank)
#  Les secrets proviennent de l'environnement ; aucune valeur sensible en dur.
# ============================================================================
spring:
  application:
    name: afb-titres-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/afb_titres}
    username: ${SPRING_DATASOURCE_USERNAME:afb_app}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me_db}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  # SMTP — diffusion du catalogue d'emissions par e-mail.
  # Laisser SMTP_HOST vide en dev : les emails seront journalises (pas envoyes).
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:true}
      mail.smtp.timeout: 10000
      mail.smtp.connectiontimeout: 10000

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: 30MB

# Documentation OpenAPI / Swagger UI.
#   UI   : http://localhost:8080/swagger-ui.html
#   JSON : http://localhost:8080/v3/api-docs
# Securite : desactiver en production (SPRINGDOC_ENABLED=false /
# SPRINGDOC_SWAGGER_UI_ENABLED=false) pour ne pas exposer publiquement la
# cartographie de l'API.
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Parametres applicatifs (lies a AppProperties).
app:
  jwt-secret: ${APP_JWT_SECRET:dev_secret_a_remplacer_en_production_32_caracteres_min}
  # Stockage des fichiers televerses (captures faciales, pieces justificatives),
  # hors racine web. En production : monter un volume dedie et sauvegarde.
  upload-dir: ${APP_UPLOAD_DIR:./data/uploads}
  access-token-ttl: ${APP_ACCESS_TOKEN_TTL:900}
  refresh-token-ttl: ${APP_REFRESH_TOKEN_TTL:2592000}
  frontend-origin: ${APP_FRONTEND_ORIGIN:http://localhost:4200}
  seed-on-start: ${APP_SEED_ON_START:true}
  # Code OTP fixe de demonstration. VIDE PAR DEFAUT : l'OTP est toujours un code
  # aleatoire reel. Le code fixe n'a de sens que pour une demo hors ligne, et il
  # doit alors etre demande explicitement (APP_MFA_DEV_CODE=123456).
  #
  # NB : meme renseigne, il n'est utilise QUE si aucun canal d'envoi n'est
  # disponible (cf. AuthController : useDevCode = mfaDevCode != null &&
  # !emailDeliverable). Sans SMTP, le code reste consultable par le back-office
  # (Administration > Codes OTP), qui le relaie au client.
  mfa-dev-code: ${APP_MFA_DEV_CODE:}
  # Serveur Amplitude / AIF — proxy backend uniquement (jamais expose au front).
  aif-base-url: ${APP_AIF_BASE_URL:https://172.21.88.95:8095/amplitude/accounts/v1}
  aif-login: ${APP_AIF_LOGIN:}
  aif-password: ${APP_AIF_PASSWORD:}
  # En production, deployer un truststore contenant le certificat AIF et mettre a false.
  aif-trust-all-certs: ${APP_AIF_TRUST_ALL_CERTS:true}
  # Expediteur des e-mails sortants.
  mail-from: ${APP_MAIL_FROM:no-reply@afriland.cm}
  mail-from-name: ${APP_MAIL_FROM_NAME:Afriland First Bank - DFT}
  # Override SMTP par l'environnement (prioritaire sur la config en base si
  # SMTP_HOST est renseigne). Permet un envoi d'e-mails operationnel des le
  # deploiement, sans passer par l'UI, et insensible a une rotation du secret.
  smtp-host: ${SMTP_HOST:}
  smtp-port: ${SMTP_PORT:587}
  smtp-username: ${SMTP_USERNAME:}
  smtp-password: ${SMTP_PASSWORD:}
  smtp-auth: ${SMTP_AUTH:true}
  smtp-starttls: ${SMTP_STARTTLS:true}

logging:
  level:
    root: info
    # INFO par defaut (evite la fuite de donnees sensibles en logs). Passer a
    # debug uniquement en developpement via LOG_LEVEL_APP=debug.
    cm.afriland.titres: ${LOG_LEVEL_APP:info}
